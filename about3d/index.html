<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Sabotage — About</title>
<!-- Nimbus Sans lokal gehostet, kein externer Font-Request -->
<style>
  @font-face { font-family: 'Nimbus Sans'; font-weight: 400; font-display: swap; src: url('../fonts/NimbusSans-Regular.woff2') format('woff2'); }
  @font-face { font-family: 'Nimbus Sans'; font-weight: 700; font-display: swap; src: url('../fonts/NimbusSans-Bold.woff2') format('woff2'); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a0a; font-family: 'Nimbus Sans', 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif; }
  canvas { display: block; }

  /* ─── Loading Screen ─── */
  #loading {
    position: fixed; inset: 0; z-index: 200;
    background: #f5f5f0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.8s ease;
    cursor: pointer;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading.fade-enter { pointer-events: none; }
  #loading.fade-enter > *:not(script) { animation: contentFade 0.4s ease-out forwards; }
  #loading.fade-enter::after {
    content: '';
    position: absolute; inset: 0;
    background: #0a0a0a;
    animation: blackFlash 0.7s ease-in-out forwards;
    z-index: 10;
  }
  @keyframes contentFade {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes blackFlash {
    0% { opacity: 0; }
    40% { opacity: 1; }
    100% { opacity: 1; }
  }

  #loading .bar-track {
    width: 240px; height: 2px; background: rgba(0,0,0,0.1); border-radius: 1px;
  }
  #loading .bar-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, rgba(255,62,142,0.3), #FF3E8E, rgba(255,62,142,0.3));
    border-radius: 1px; transition: width 0.3s ease;
  }
  #loading .status {
    margin-top: 1rem; color: rgba(0,0,0,0.35); font-size: 0.85rem;
    font-family: monospace;
  }

  /* ─── Resume Overlay ─── */
  #overlay {
    position: fixed; inset: 0; z-index: 150;
    background: rgba(245,245,240,0.6);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: opacity 0.4s ease;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay .resume-text {
    font-family: 'Nimbus Sans', 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif;
    color: rgba(0,0,0,0.85); font-size: 2rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid rgba(255,62,142,0.4);
    padding: 0.8rem 2.5rem;
    transition: all 0.25s ease;
    background: rgba(255,62,142,0.05);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    box-shadow: 0 0 20px rgba(255,62,142,0.08);
  }
  #overlay .resume-text:hover {
    background: rgba(255,62,142,0.15);
    border-color: rgba(255,62,142,0.5);
    box-shadow: 0 0 30px rgba(255,62,142,0.2);
  }

  /* ─── Crosshair ─── */
  #crosshair {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 50; pointer-events: none; display: none;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute;
    background: rgba(0,0,0,0.4);
  }
  #crosshair::before {
    width: 16px; height: 1.5px;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }
  #crosshair::after {
    width: 1.5px; height: 16px;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }

  /* ─── Gallery Header ─── */
  #gallery-header {
    position: fixed; top: 0; left: 0; width: 100%; z-index: 160;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 36px;
    background: linear-gradient(to bottom, rgba(245,245,240,0.7) 0%, rgba(245,245,240,0.2) 60%, transparent 100%);
    pointer-events: none;
    opacity: 0; transition: opacity 0.4s ease;
    font-family: 'Nimbus Sans', 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif;
  }
  #gallery-header.visible { opacity: 1; }
  #gallery-header a, #gallery-header span { pointer-events: auto; }
  #gallery-header .header-logo {
    font-size: 0.85rem; font-weight: 400; color: rgba(0,0,0,0.85);
    letter-spacing: 0.3em; text-decoration: none;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 14px;
  }
  #gallery-header .header-logo:hover { color: #FF3E8E; }
  #gallery-header nav { display: flex; gap: 28px; align-items: center; }
  #gallery-header nav a {
    color: rgba(0,0,0,0.65); text-decoration: none;
    font-size: 0.75rem; letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: all 0.15s ease;
    font-family: 'Nimbus Sans', 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif;
    font-weight: 400;
  }
  #gallery-header nav a:hover { color: rgba(0,0,0,0.85); }
  #gallery-header nav a.active { color: #d4326f; }
  #gallery-header nav a.ig-link { display: flex; align-items: center; gap: 4px; }
  #gallery-header nav a.ig-link svg { width: 16px; height: 16px; fill: currentColor; }

  /* ─── Controls Hint ─── */
  #controls-hint {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%);
    z-index: 50; pointer-events: none;
    display: none; text-align: center;
  }

  /* ─── Hotspot Marker ─── */
  .hotspot-marker {
    position: absolute; z-index: 40;
    width: 32px; height: 32px;
    pointer-events: none;
    transform: translate(-50%, -50%);
  }
  .hotspot-marker .ring {
    position: absolute; inset: 0;
    border: 2px solid #FF3E8E;
    border-radius: 50%;
    animation: hotspotPulse 2s ease-in-out infinite;
  }
  .hotspot-marker .dot {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 8px; height: 8px;
    background: #FF3E8E;
    border-radius: 50%;
  }
  .hotspot-marker .label {
    position: absolute;
    top: -28px; left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: 0.6rem; color: #FF3E8E;
    letter-spacing: 0.1em; text-transform: uppercase;
    font-family: monospace;
    opacity: 0; transition: opacity 0.2s;
    pointer-events: none;
  }
  .hotspot-marker.nearby .label { opacity: 1; }
  @keyframes hotspotPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.4; }
  }

  /* ─── Hotspot Hover Hint ─── */
  #hotspot-hint {
    position: fixed; top: 55%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 45; pointer-events: none;
    font-size: 0.7rem; color: rgba(0,0,0,0.6);
    letter-spacing: 0.1em; text-transform: uppercase;
    font-family: monospace;
    text-shadow: 0 0 12px rgba(255,255,255,0.8), 0 0 24px rgba(255,255,255,0.4);
    opacity: 0; transition: opacity 0.2s;
  }
  #hotspot-hint.visible { opacity: 1; }

  /* ─── Info Panel ─── */
  #info-panel {
    position: fixed; z-index: 100;
    top: 50%; right: 40px;
    transform: translateY(-50%);
    width: 380px; max-height: 80vh;
    background: rgba(245,245,240,0.95);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,62,142,0.3);
    border-radius: 4px;
    padding: 0;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 30px rgba(255,62,142,0.08);
  }
  #info-panel.visible { opacity: 1; pointer-events: auto; }
  #info-panel .panel-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  #info-panel .panel-category {
    font-size: 0.6rem; color: #FF3E8E;
    font-family: monospace;
    letter-spacing: 0.2em; text-transform: uppercase;
    margin-bottom: 6px;
  }
  #info-panel .panel-title {
    font-family: 'Nimbus Sans', 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif;
    font-size: 1.4rem; font-weight: 400;
    color: rgba(0,0,0,0.85);
    line-height: 1.3;
  }
  #info-panel .panel-body {
    padding: 16px 24px 24px;
    overflow-y: auto;
    max-height: calc(80vh - 120px);
  }
  #info-panel .panel-text {
    font-size: 0.78rem; line-height: 1.8;
    color: rgba(0,0,0,0.65);
    font-family: monospace;
  }
  #info-panel .panel-detail {
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid rgba(0,0,0,0.06);
    font-size: 0.65rem; color: rgba(0,0,0,0.35);
    font-family: monospace;
    letter-spacing: 0.05em;
  }
  #info-panel .close-btn {
    position: absolute; top: 16px; right: 16px;
    background: rgba(255,62,142,0.05); border: 1px solid rgba(255,62,142,0.4);
    color: rgba(0,0,0,0.6); font-size: 1.2rem;
    cursor: pointer; line-height: 1;
    width: 32px; height: 32px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s ease;
    box-shadow: 0 0 20px rgba(255,62,142,0.08);
  }
  #info-panel .close-btn:hover {
    background: rgba(255,62,142,0.15);
    border-color: rgba(255,62,142,0.5);
    box-shadow: 0 0 30px rgba(255,62,142,0.2);
  }
  #info-panel .close-hint {
    text-align: center; padding: 8px;
    font-size: 0.55rem; color: rgba(0,0,0,0.25);
    font-family: monospace;
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  /* ─── Mobile ─── */
  @media (max-width: 768px) {
    #info-panel {
      right: 16px; left: 16px;
      width: auto; top: auto;
      bottom: 20px; transform: none;
      max-height: 60vh;
    }
    #gallery-header { padding: 12px 16px; }
  }
</style>
</head>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ─── Hotspot Data ────────────────────────────────────────────────────
const HOTSPOTS = [
  {
    id: 'computer',
    position: new THREE.Vector3(-0.81, 1.51, 3.34),
    category: 'Arbeit',
    title: 'Der Computer',
    text: `Links laufen Kampagnen für Vier für Texas, rechts der Code für diese Seite. Ich hab in Zürich angefangen, SEA bei Webrepublic, dann E-Commerce bei Outfittery in Berlin. Jetzt Performance Marketing in der Agentur und nebenbei das hier. Irgendwann verschwimmt die Grenze — und das ist okay so.`,
    detail: ''
  },
  {
    id: 'books',
    position: new THREE.Vector3(-2.46, 1.32, 1.83),
    category: 'Lesen',
    title: 'Der Bücherstapel',
    text: `Romane neben Kunstbüchern neben Sachen über kreative Prozesse. Gießen studiert, ein Semester in Istanbul gemalt. Sortiert wird das nicht mehr. Wer was sucht, findet was anderes. Meistens das Bessere.`,
    detail: ''
  },
  {
    id: 'clothes',
    position: new THREE.Vector3(0.49, 1.65, -0.22),
    category: 'Stil',
    title: 'Die Kleiderstange',
    text: `Da hängt die MA-1 neben dem Leopardenprint. Ich ziehe mich an wie ich male — Sachen die eigentlich nicht zusammengehören, bis sie es tun.`,
    detail: ''
  },
  {
    id: 'plants',
    position: new THREE.Vector3(0.40, 1.32, 2.25),
    category: 'Leben',
    title: 'Die Pflanzen',
    text: `Die stehen hier seit ich eingezogen bin. Ich vergesse sie regelmäßig. Sie machen trotzdem weiter. Vielleicht ist das die treffendste Metapher für alles hier.`,
    detail: ''
  },
  {
    id: 'bike',
    position: new THREE.Vector3(-2.0, 1.0, 2.8),
    category: 'Bewegung',
    title: 'Das Fahrrad',
    text: `Steht im Zimmer, weil es draußen geklaut wird. Und weil es hier reinpasst. Gerade so.`,
    detail: ''
  },
  {
    id: 'ceiling',
    position: new THREE.Vector3(-1.0, 2.3, 0.0),
    category: 'Ort',
    title: 'Die Dachschräge',
    text: `Wächtersbach, Hessen. Nicht die Adresse die man auf eine Künstler-Bio schreibt. Davor Zürich, Berlin, Istanbul, Kirgistan. Ich bin viel umgezogen. Hier bleibe ich erstmal. Die Schräge erinnert mich jeden Morgen daran, dass nichts gerade verläuft.`,
    detail: ''
  },
  {
    id: 'bed',
    position: new THREE.Vector3(-1.15, 0.95, -1.83),
    category: 'Ehrlich',
    title: 'Das Bett',
    text: `Hier liegen ein Skizzenbuch und ein Handy. Und ehrlich gesagt meistens ich — mit Skizzenbuch und Handy.`,
    detail: ''
  },
  {
    id: 'lamp',
    position: new THREE.Vector3(-2.2, 0.9, -2.2),
    category: 'Objekt',
    title: 'Die orange Lampe',
    text: `Steht hier, weil sie orange ist. Mehr Konzept steckt da nicht dahinter.`,
    detail: ''
  },
  {
    id: 'universe',
    position: new THREE.Vector3(-1.50, 1.73, -3.65),
    category: '???',
    title: 'Das Universum',
    text: `Du bist aus dem Zimmer rausgegangen. Die meisten bleiben drin. Hier draußen gibt es nichts — außer allem.`,
    detail: ''
  },
  {
    id: 'desktop-note',
    position: new THREE.Vector3(-0.81, 1.1, 3.2),
    category: 'Transparenz',
    title: 'Desktop-Notiz',
    text: `Wie fast alles hier wurden auch diese Texte mit KI geschrieben. Ich hab korrigiert, gestrichen und entschieden was bleibt.`,
    detail: ''
  }
];

// ─── DOM Refs ────────────────────────────────────────────────────────
const loadingEl    = document.getElementById('loading');
const loadBar      = document.getElementById('load-bar');
const loadStatus   = document.getElementById('load-status');
const ctaLine      = document.getElementById('cta-line');
const overlayEl    = document.getElementById('overlay');
const crosshairEl  = document.getElementById('crosshair');
const controlsHint = document.getElementById('controls-hint');
const headerEl     = document.getElementById('gallery-header');
const hotspotHint  = document.getElementById('hotspot-hint');
const panel        = document.getElementById('info-panel');

// ─── Three.js Basics ─────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 100);
camera.position.set(0, 1.7, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 2.4;
document.body.appendChild(renderer.domElement);

// ─── Lighting ────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffeedd, 1.8));
scene.add(new THREE.HemisphereLight(0xffffff, 0x666666, 0.8));

const skyLight = new THREE.DirectionalLight(0xffffff, 1.2);
skyLight.position.set(0, 10, 0);
scene.add(skyLight);

const fillLight = new THREE.DirectionalLight(0xffeedd, 0.6);
fillLight.position.set(5, 8, 3);
scene.add(fillLight);

const fillLight2 = new THREE.DirectionalLight(0xeeeeff, 0.5);
fillLight2.position.set(-5, 6, -3);
scene.add(fillLight2);

// Pink accent (subtle)
const pinkLight = new THREE.PointLight(0xFF3E8E, 0.15, 10);
pinkLight.position.set(0, 2.5, 0);
scene.add(pinkLight);

// ─── Room Bounds ─────────────────────────────────────────────────────
let ROOM_BOUNDS = { xMin: -10, xMax: 10, zMin: -10, zMax: 10 };
let EYE_HEIGHT = 1.7;

// ─── Raycaster ───────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
raycaster.far = 4;
const screenCenter = new THREE.Vector2(0, 0);

const hotspotSpheres = [];

function createHotspotSpheres() {
  const geo = new THREE.SphereGeometry(0.35, 8, 8);
  const mat = new THREE.MeshBasicMaterial({ visible: false });

  HOTSPOTS.forEach((hs, i) => {
    const sphere = new THREE.Mesh(geo, mat);
    sphere.position.copy(hs.position);
    sphere.userData.hotspotIndex = i;
    scene.add(sphere);
    hotspotSpheres.push(sphere);
  });
}

// ─── GLB Loading ─────────────────────────────────────────────────────
const loader = new GLTFLoader();
let roomLoaded = false;

function updateLoading(pct, msg) {
  loadBar.style.width = pct + '%';
  loadStatus.textContent = msg;
}

function loadRoom(url) {
  updateLoading(5, 'loading room...');

  loader.load(
    url,
    (gltf) => {
      const model = gltf.scene;

      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());

      // Scale so longest dimension is ~8 units
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 8 / maxDim;
      model.scale.setScalar(scale);

      // Recalculate after scaling
      const scaledBox = new THREE.Box3().setFromObject(model);
      const scaledCenter = scaledBox.getCenter(new THREE.Vector3());
      const scaledSize = scaledBox.getSize(new THREE.Vector3());

      // Center on XZ, put floor at Y=0
      model.position.x -= scaledCenter.x;
      model.position.z -= scaledCenter.z;
      model.position.y -= scaledBox.min.y;

      scene.add(model);

      // Compute room bounds
      const finalBox = new THREE.Box3().setFromObject(model);
      const margin = 0.3;
      ROOM_BOUNDS = {
        xMin: finalBox.min.x + margin,
        xMax: finalBox.max.x - margin,
        zMin: finalBox.min.z + margin,
        zMax: finalBox.max.z - margin
      };

      // Eye height
      EYE_HEIGHT = Math.min(Math.max(scaledSize.y * 0.45, 1.2), 2.0);
      camera.position.set(0, EYE_HEIGHT, 0);

      roomLoaded = true;
      finishLoading();
    },
    (progress) => {
      if (progress.total > 0) {
        const pct = Math.min(95, Math.round((progress.loaded / progress.total) * 95));
        updateLoading(pct, `loading room... ${pct}%`);
      }
    },
    (error) => {
      console.warn('GLB load error:', error);
      updateLoading(0, 'error loading room.glb');
    }
  );
}

function finishLoading() {
  updateLoading(100, 'ready');
  loadStatus.style.display = 'none';
  document.querySelector('.bar-track').style.display = 'none';
  loadingEl.style.cursor = 'pointer';

  // Show CTA
  ctaLine.style.display = 'block';

  // CTA hover
  ctaLine.addEventListener('mouseenter', () => {
    ctaLine.style.background = 'rgba(255,62,142,0.15)';
    ctaLine.style.borderColor = 'rgba(255,62,142,0.5)';
    ctaLine.style.boxShadow = '0 0 30px rgba(255,62,142,0.2)';
  });
  ctaLine.addEventListener('mouseleave', () => {
    ctaLine.style.background = 'rgba(255,62,142,0.05)';
    ctaLine.style.borderColor = 'rgba(255,62,142,0.4)';
    ctaLine.style.boxShadow = '0 0 20px rgba(255,62,142,0.08)';
  });

  // Create hotspot interaction spheres
  createHotspotSpheres();
  createHotspotMarkers();

  // Click anywhere to enter
  let entered = false;
  loadingEl.addEventListener('click', () => {
    if (entered) return;
    entered = true;
    loadingEl.classList.add('fade-enter');
    setTimeout(() => {
      loadingEl.style.display = 'none';
      headerEl.classList.add('visible');
      renderer.domElement.requestPointerLock();
    }, 700);
  });
}

// ─── Pointer Lock ────────────────────────────────────────────────────
let isLocked = false;

overlayEl.addEventListener('click', () => {
  renderer.domElement.requestPointerLock();
});

renderer.domElement.addEventListener('click', () => {
  if (!isLocked && roomLoaded) {
    renderer.domElement.requestPointerLock();
  }
});

document.addEventListener('pointerlockchange', () => {
  isLocked = document.pointerLockElement === renderer.domElement;
  if (isLocked) {
    crosshairEl.style.display = 'block';
    controlsHint.style.display = 'block';
    panel.classList.remove('visible');
    activeHotspot = -1;
  } else {
    crosshairEl.style.display = 'none';
    controlsHint.style.display = 'none';
    hotspotHint.classList.remove('visible');
  }
});

// ─── Mouse Look ──────────────────────────────────────────────────────
const euler = new THREE.Euler(0, 0, 0, 'YXZ');
const MOUSE_SENSITIVITY = 0.002;
const MAX_PITCH = Math.PI / 2 - 0.05;

document.addEventListener('mousemove', (e) => {
  if (!isLocked) return;
  euler.setFromQuaternion(camera.quaternion);
  euler.y -= e.movementX * MOUSE_SENSITIVITY;
  euler.x -= e.movementY * MOUSE_SENSITIVITY;
  euler.x = Math.max(-MAX_PITCH, Math.min(MAX_PITCH, euler.x));
  camera.quaternion.setFromEuler(euler);
});

// ─── Keyboard Movement ──────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if ((e.code === 'KeyQ' || e.code === 'Tab') && isLocked) {
    e.preventDefault();
    document.exitPointerLock();
  }
  if (e.code === 'Escape') {
    if (activeHotspot >= 0) {
      closePanel();
      e.preventDefault();
    }
  }
});
document.addEventListener('keyup', (e) => { keys[e.code] = false; });

const MOVE_SPEED = 2.8;
const direction = new THREE.Vector3();
const forward = new THREE.Vector3();
const right = new THREE.Vector3();

function updateMovement(dt) {
  if (!isLocked) return;

  direction.set(0, 0, 0);

  camera.getWorldDirection(forward);
  forward.y = 0;
  forward.normalize();

  right.crossVectors(forward, camera.up).normalize();

  if (keys['KeyW'] || keys['ArrowUp'])    direction.add(forward);
  if (keys['KeyS'] || keys['ArrowDown'])   direction.sub(forward);
  if (keys['KeyA'] || keys['ArrowLeft'])   direction.sub(right);
  if (keys['KeyD'] || keys['ArrowRight'])  direction.add(right);

  if (direction.lengthSq() > 0) {
    direction.normalize();
    camera.position.addScaledVector(direction, MOVE_SPEED * dt);
  }

  camera.position.x = Math.max(ROOM_BOUNDS.xMin, Math.min(ROOM_BOUNDS.xMax, camera.position.x));
  camera.position.z = Math.max(ROOM_BOUNDS.zMin, Math.min(ROOM_BOUNDS.zMax, camera.position.z));
  camera.position.y = EYE_HEIGHT;
}

// ─── Hotspot Interaction ─────────────────────────────────────────────
let hoveredHotspot = -1;
let activeHotspot = -1;

function updateHotspotRaycast() {
  if (!isLocked || !roomLoaded) return;

  raycaster.setFromCamera(screenCenter, camera);
  const hits = raycaster.intersectObjects(hotspotSpheres);

  if (hits.length > 0) {
    const idx = hits[0].object.userData.hotspotIndex;
    if (hoveredHotspot !== idx) {
      hoveredHotspot = idx;
      hotspotHint.textContent = `[ ${HOTSPOTS[idx].title} ] — Click`;
      hotspotHint.classList.add('visible');
    }
  } else {
    if (hoveredHotspot >= 0) {
      hoveredHotspot = -1;
      hotspotHint.classList.remove('visible');
    }
  }
}

renderer.domElement.addEventListener('click', () => {
  if (isLocked && hoveredHotspot >= 0) {
    openPanel(hoveredHotspot);
  }
});

// ─── Info Panel ──────────────────────────────────────────────────────
function openPanel(index) {
  const hs = HOTSPOTS[index];
  activeHotspot = index;

  document.getElementById('panel-category').textContent = hs.category;
  document.getElementById('panel-title').textContent = hs.title;
  document.getElementById('panel-text').innerHTML = hs.text;
  document.getElementById('panel-detail').textContent = hs.detail;

  panel.classList.add('visible');
  document.exitPointerLock();
}

function closePanel() {
  panel.classList.remove('visible');
  activeHotspot = -1;
  renderer.domElement.requestPointerLock();
}

document.getElementById('close-panel-btn').addEventListener('click', closePanel);

// Click outside panel to close
panel.addEventListener('click', (e) => {
  if (e.target === panel) closePanel();
});

// ─── Hotspot Markers (HTML overlays projected from 3D) ───────────────
const hotspotContainer = document.getElementById('hotspot-container');
const markerElements = [];

function createHotspotMarkers() {
  HOTSPOTS.forEach((hs, i) => {
    const el = document.createElement('div');
    el.className = 'hotspot-marker';
    el.innerHTML = `<div class="ring"></div><div class="dot"></div><div class="label">${hs.title}</div>`;
    hotspotContainer.appendChild(el);
    markerElements.push(el);
  });
}

function updateHotspotPositions() {
  if (!roomLoaded) return;

  const w2 = window.innerWidth / 2;
  const h2 = window.innerHeight / 2;

  HOTSPOTS.forEach((hs, i) => {
    const el = markerElements[i];
    if (!el) return;

    const projected = hs.position.clone().project(camera);

    if (projected.z > 1) {
      el.style.display = 'none';
      return;
    }

    const x = (projected.x * w2) + w2;
    const y = -(projected.y * h2) + h2;

    el.style.display = 'block';
    el.style.left = x + 'px';
    el.style.top = y + 'px';

    const dist = camera.position.distanceTo(hs.position);
    const opacity = THREE.MathUtils.clamp(1 - (dist - 2) / 8, 0.1, 1);
    el.style.opacity = opacity;

    if (dist < 3) {
      el.classList.add('nearby');
    } else {
      el.classList.remove('nearby');
    }
  });
}

// ─── Resize ──────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Debug: Position Display (press P to toggle) ────────────────────
const debugEl = document.createElement('div');
debugEl.style.cssText = 'display:none; position:fixed; bottom:70px; left:16px; z-index:200; font-family:monospace; font-size:0.7rem; color:#FF3E8E; background:rgba(245,245,240,0.9); padding:6px 12px; border-radius:3px; pointer-events:none; border:1px solid rgba(255,62,142,0.3);';
document.body.appendChild(debugEl);

const debugTarget = document.createElement('div');
debugTarget.style.cssText = 'display:none; position:fixed; bottom:44px; left:16px; z-index:200; font-family:monospace; font-size:0.7rem; color:rgba(0,0,0,0.6); background:rgba(245,245,240,0.9); padding:6px 12px; border-radius:3px; pointer-events:none; border:1px solid rgba(0,0,0,0.1);';
document.body.appendChild(debugTarget);

let debugMode = false;
document.addEventListener('keydown', (e) => {
  if (e.code === 'KeyP' && isLocked) {
    debugMode = !debugMode;
    debugEl.style.display = debugMode ? 'block' : 'none';
    debugTarget.style.display = debugMode ? 'block' : 'none';
  }
});

const targetRaycaster = new THREE.Raycaster();
targetRaycaster.far = 20;

// ─── Animation Loop ──────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  updateMovement(dt);
  updateHotspotRaycast();
  updateHotspotPositions();

  // Debug position display
  if (debugMode && isLocked) {
    debugEl.textContent = `cam: x:${camera.position.x.toFixed(2)}  y:${camera.position.y.toFixed(2)}  z:${camera.position.z.toFixed(2)}`;

    targetRaycaster.setFromCamera(screenCenter, camera);
    const allMeshes = [];
    scene.traverse(child => { if (child.isMesh && child.material.visible !== false) allMeshes.push(child); });
    const targetHits = targetRaycaster.intersectObjects(allMeshes);
    if (targetHits.length > 0) {
      const p = targetHits[0].point;
      debugTarget.textContent = `target: x:${p.x.toFixed(2)}  y:${p.y.toFixed(2)}  z:${p.z.toFixed(2)}`;
    } else {
      debugTarget.textContent = 'target: ---';
    }
  }

  renderer.render(scene, camera);
}
animate();

// ─── Load the Room ───────────────────────────────────────────────────
loadRoom('./room.glb');

</script>
</body>
</html>
