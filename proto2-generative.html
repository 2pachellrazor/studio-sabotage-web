<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Prototyp 2 — Generative Canvas Snake</title>
<style>
  @font-face { font-family: 'Nimbus Sans'; font-weight: 400; src: url('./fonts/NimbusSans-Regular.woff2') format('woff2'); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; overflow: hidden; font-family: 'Nimbus Sans', sans-serif; }
  canvas#snakeBg { position: fixed; inset: 0; width: 100%; height: 100%; opacity: 0.45; }
  .vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 28% 48% at 50% 45%, transparent 0%, transparent 35%, rgba(255,255,255,0.5) 55%, rgba(255,255,255,0.9) 72%, white 88%);
    pointer-events: none; z-index: 2;
  }
  .container { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
  .brand { text-align: center; }
  .brand p { color: rgba(0,0,0,0.85); font-size: 1rem; letter-spacing: 0.35em; text-transform: uppercase; margin-bottom: 1.2rem; }
  .brand img.logo { height: 200px; width: auto; margin-bottom: 0.8rem; }
  .brand img.tag { width: 147px; height: auto; }
  .cta {
    margin-top: 1rem; font-size: 2rem; letter-spacing: 0.1em; text-transform: uppercase;
    border: 1px solid rgba(245,160,181,0.4); padding: 0.8rem 2.5rem;
    background: rgba(245,160,181,0.05); backdrop-filter: blur(6px);
    color: rgba(0,0,0,0.85); cursor: pointer;
  }
</style>
</head>
<body>

<canvas id="snakeBg"></canvas>
<div class="vignette"></div>

<div class="container">
  <div class="brand">
    <p>Studio Sabotage</p>
    <img class="logo" src="./gallery3d/logo.png" alt="S">
    <br>
    <img class="tag" src="./gallery3d/tag.png" alt="tag">
    <div class="cta">Click to Come in, Bitches.</div>
  </div>
</div>

<script>
const canvas = document.getElementById('snakeBg');
const ctx = canvas.getContext('2d');
let W, H, mouseX = 0.5, mouseY = 0.5;
let snakes = [];

function resize() {
  W = canvas.width = window.innerWidth * 2;
  H = canvas.height = window.innerHeight * 2;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
}
resize();
window.addEventListener('resize', resize);

document.addEventListener('mousemove', e => {
  mouseX = e.clientX / window.innerWidth;
  mouseY = e.clientY / window.innerHeight;
});

class Snake {
  constructor(startX, startY, length, speed, thickness) {
    this.segments = [];
    this.length = length;
    this.speed = speed;
    this.thickness = thickness;
    this.angle = Math.random() * Math.PI * 2;
    this.noiseOffset = Math.random() * 1000;
    this.drawn = 0; // for draw-in animation
    for (let i = 0; i < length; i++) {
      this.segments.push({ x: startX, y: startY });
    }
  }

  update(t) {
    this.drawn = Math.min(this.drawn + 2, this.length);
    // Head follows organic noise-based movement + gentle mouse influence
    const noiseVal = Math.sin(t * this.speed + this.noiseOffset) * 0.3 +
                     Math.sin(t * this.speed * 0.7 + this.noiseOffset * 2) * 0.2 +
                     Math.sin(t * this.speed * 1.3 + this.noiseOffset * 0.5) * 0.15;

    // Gentle pull toward/away from mouse
    const head = this.segments[0];
    const dx = (mouseX * W) - head.x;
    const dy = (mouseY * H) - head.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const repel = dist < W * 0.2 ? -0.3 : 0.05; // repel when close, attract when far

    this.angle += noiseVal * 0.08;
    if (dist > 0) {
      this.angle += Math.atan2(dy, dx) * repel * 0.01;
    }

    // Move head
    const newX = head.x + Math.cos(this.angle) * this.speed * 3;
    const newY = head.y + Math.sin(this.angle) * this.speed * 3;

    // Wrap around edges with padding
    const pad = 100;
    this.segments.unshift({
      x: newX < -pad ? W + pad : newX > W + pad ? -pad : newX,
      y: newY < -pad ? H + pad : newY > H + pad ? -pad : newY
    });
    if (this.segments.length > this.length) this.segments.pop();
  }

  draw() {
    const segs = this.segments.slice(0, this.drawn);
    if (segs.length < 4) return;

    ctx.beginPath();
    ctx.moveTo(segs[0].x, segs[0].y);

    for (let i = 1; i < segs.length - 2; i++) {
      const xc = (segs[i].x + segs[i + 1].x) / 2;
      const yc = (segs[i].y + segs[i + 1].y) / 2;
      ctx.quadraticCurveTo(segs[i].x, segs[i].y, xc, yc);
    }

    ctx.strokeStyle = '#000';
    ctx.lineWidth = this.thickness;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Thinner detail line
    ctx.beginPath();
    ctx.moveTo(segs[0].x, segs[0].y);
    for (let i = 1; i < segs.length - 2; i++) {
      const xc = (segs[i].x + segs[i + 1].x) / 2;
      const yc = (segs[i].y + segs[i + 1].y) / 2;
      ctx.quadraticCurveTo(segs[i].x, segs[i].y, xc, yc);
    }
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = this.thickness * 3;
    ctx.stroke();

    // Scale pattern along body
    for (let i = 0; i < segs.length - 1; i += 4) {
      if (i >= this.drawn) break;
      const s = segs[i];
      const fade = 1 - (i / segs.length);
      ctx.beginPath();
      ctx.arc(s.x, s.y, this.thickness * 0.3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,0,0,${0.1 * fade})`;
      ctx.fill();
    }
  }
}

// Create snakes at various positions
snakes.push(new Snake(W * 0.2, H * 0.3, 200, 1.2, 3));
snakes.push(new Snake(W * 0.8, H * 0.7, 180, 1.0, 2.5));
snakes.push(new Snake(W * 0.5, H * 0.1, 150, 1.4, 2));
snakes.push(new Snake(W * 0.1, H * 0.8, 160, 0.9, 2));
snakes.push(new Snake(W * 0.9, H * 0.2, 140, 1.1, 1.5));

let t = 0;
function animate() {
  ctx.clearRect(0, 0, W, H);
  t += 0.016;
  snakes.forEach(s => {
    s.update(t);
    s.draw();
  });
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
